name: Aggregate Threat Intel Lists

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run aggregation script
        shell: pwsh
        run: ./scripts/aggregate.ps1
        continue-on-error: true

      - name: Commit and push updated lists
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lists/
          if git diff --staged --quiet; then
            echo "No changes — lists are already up to date."
          else
            git commit -m "chore: update threat intel lists [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git pull --rebase origin main
            git push
          fi
